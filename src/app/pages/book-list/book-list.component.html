<div class="min-h-screen bg-gray-100 p-8">
  <div class="max-w-2xl mx-auto">

    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-indigo-700">📚 Mes Livres</h1>
      <a routerLink="/" class="text-gray-500 hover:text-indigo-600 transition">← Accueil</a>
    </div>

    <!-- Formulaire ajout -->
    <div class="bg-white rounded-xl shadow p-6 mb-8">
      <h2 class="text-xl font-semibold mb-4">Ajouter un livre</h2>
      <input [(ngModel)]="newTitle" type="text" placeholder="Titre *" class="w-full border rounded-lg p-2 mb-3" />
      <input [(ngModel)]="newAuthor" type="text" placeholder="Auteur *" class="w-full border rounded-lg p-2 mb-3" />
      <input [(ngModel)]="newGenre" type="text" placeholder="Genre" class="w-full border rounded-lg p-2 mb-3" />
      <input [(ngModel)]="newYear" type="number" placeholder="Année" class="w-full border rounded-lg p-2 mb-3" />
      <textarea [(ngModel)]="newNotes" placeholder="Notes / fiche de lecture" class="w-full border rounded-lg p-2 mb-4 h-24"></textarea>
      <button (click)="addBook()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition w-full">
        Ajouter
      </button>
    </div>

    <!-- Liste des livres -->
    <div *ngIf="books.length === 0" class="text-center text-gray-400 py-12">
      Aucun livre pour l'instant. Ajoutez-en un ! 📖
    </div>

    <div *ngFor="let book of books" class="bg-white rounded-xl shadow p-4 mb-4">
      <div class="flex justify-between items-start">
        <div class="flex-1">
          <p class="font-bold text-lg">{{ book.title }}</p>
          <p class="text-gray-500 text-sm">{{ book.author }}</p>
          <p *ngIf="book.genre" class="text-gray-400 text-xs mt-1">{{ book.genre }} {{ book.year ? '· ' + book.year : '' }}</p>
          <p *ngIf="book.notes" class="text-gray-600 text-sm mt-2 italic">{{ book.notes }}</p>
        </div>
        <div class="flex flex-col items-end gap-2 ml-4">
          <span (click)="toggleRead(book.id)" class="cursor-pointer text-sm font-semibold" [class]="book.read ? 'text-green-500' : 'text-orange-400'">
            {{ book.read ? 'Lu ✅' : 'À lire 📖' }}
          </span>
          <button (click)="deleteBook(book.id)" class="text-red-400 hover:text-red-600 text-sm transition">
            Supprimer
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
